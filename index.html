<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票下單記錄助手</title>
    <!-- 載入 React & Babel (編譯 JSX) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 Lucide 圖標 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [records, setRecords] = useState([]);
            const [showSettings, setShowSettings] = useState(false);
            const [gasUrl, setGasUrl] = useState(localStorage.getItem('stock_gas_url') || ''); 
            const [isSyncing, setIsSyncing] = useState(false);
            const [statusMsg, setStatusMsg] = useState({ type: '', text: '' });

            const [formData, setFormData] = useState({
                symbol: '',
                quantity: '',
                buyPrice: '',
                sellPrice: '',
                note: ''
            });

            useEffect(() => {
                localStorage.setItem('stock_gas_url', gasUrl);
            }, [gasUrl]);

            const formatCurrency = (num) => {
                return '$' + Number(num).toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 2 });
            };

            const formatQuantity = (num) => {
                return Number(num).toLocaleString();
            };

            const calculatePL = (buy, sell, qty) => {
                if (!buy || !sell || !qty) return 0;
                return (parseFloat(sell) - parseFloat(buy)) * parseFloat(qty);
            };

            const currentPL = calculatePL(formData.buyPrice, formData.sellPrice, formData.quantity);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const showStatus = (type, text) => {
                setStatusMsg({ type, text });
                setTimeout(() => setStatusMsg({ type: '', text: '' }), 3000);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!formData.symbol || !formData.quantity || !formData.buyPrice) {
                    showStatus('error', '請填寫必填欄位');
                    return;
                }

                const newRecord = {
                    ...formData,
                    id: Date.now(),
                    date: new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                    pl: calculatePL(formData.buyPrice, formData.sellPrice, formData.quantity)
                };

                setRecords([newRecord, ...records]);

                if (gasUrl) {
                    syncToGoogleSheets(newRecord);
                }

                setFormData({ symbol: '', quantity: '', buyPrice: '', sellPrice: '', note: '' });
                showStatus('success', '紀錄已儲存');
            };

            const syncToGoogleSheets = async (data) => {
                setIsSyncing(true);
                try {
                    await fetch(gasUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    showStatus('success', '已同步至 Google Sheet');
                } catch (error) {
                    showStatus('error', '同步失敗');
                } finally {
                    setIsSyncing(false);
                }
            };

            const deleteRecord = (id) => {
                if(window.confirm('確定要刪除此紀錄嗎？')) {
                    setRecords(records.filter(r => r.id !== id));
                }
            };

            const totalPL = records.reduce((sum, r) => sum + r.pl, 0);

            return (
                <div className="min-h-screen pb-20">
                    <div className="bg-white border-b border-slate-200 sticky top-0 z-10 px-4 py-3 flex justify-between items-center shadow-sm">
                        <h1 className="text-xl font-bold text-indigo-700 flex items-center gap-2">
                             股票紀錄助手
                        </h1>
                        <button 
                            onClick={() => setShowSettings(!showSettings)}
                            className="p-2 bg-slate-100 rounded-full text-slate-500"
                        >
                            設定網址
                        </button>
                    </div>

                    <div className="max-w-md mx-auto p-4 space-y-6">
                        {statusMsg.text && (
                            <div className={`fixed top-16 left-4 right-4 z-50 p-4 rounded-xl shadow-lg border animate-fade-in ${
                                statusMsg.type === 'success' ? 'bg-green-600 text-white' : 'bg-red-600 text-white'
                            }`}>
                                <span className="font-medium">{statusMsg.text}</span>
                            </div>
                        )}

                        {showSettings && (
                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                                <label className="block text-sm font-bold text-slate-700 mb-2">Google Apps Script URL</label>
                                <input
                                    type="text"
                                    className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl mb-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none"
                                    placeholder="貼上部署網址..."
                                    value={gasUrl}
                                    onChange={(e) => setGasUrl(e.target.value)}
                                />
                                <button onClick={() => setShowSettings(false)} className="w-full py-2 bg-indigo-600 text-white rounded-lg font-bold">儲存設定</button>
                            </div>
                        )}

                        <div className="grid grid-cols-2 gap-3">
                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                                <p className="text-xs text-slate-400 font-bold uppercase">總筆數</p>
                                <p className="text-2xl font-black">{records.length}</p>
                            </div>
                            <div className={`p-4 rounded-2xl shadow-sm border ${totalPL >= 0 ? 'bg-green-50 border-green-100' : 'bg-red-50 border-red-100'}`}>
                                <p className="text-xs text-slate-400 font-bold uppercase">累計損益</p>
                                <p className={`text-2xl font-black ${totalPL >= 0 ? 'text-green-600' : 'text-red-600'}`}>
                                    {formatCurrency(totalPL)}
                                </p>
                            </div>
                        </div>

                        <div className="bg-white p-5 rounded-3xl shadow-md border border-slate-100">
                            <h2 className="text-lg font-bold mb-4">新增下單</h2>
                            <form onSubmit={handleSubmit} className="space-y-4">
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="col-span-2">
                                        <label className="text-xs font-bold text-slate-400 ml-1">股票代碼</label>
                                        <input type="text" name="symbol" className="w-full p-4 bg-slate-50 border-0 rounded-2xl text-lg font-bold outline-none" placeholder="例如: 2330" value={formData.symbol} onChange={handleInputChange} />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-400 ml-1">股數</label>
                                        <input type="number" name="quantity" className="w-full p-4 bg-slate-50 border-0 rounded-2xl text-lg font-bold outline-none" value={formData.quantity} onChange={handleInputChange} />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-400 ml-1">買入價</label>
                                        <input type="number" step="0.01" name="buyPrice" className="w-full p-4 bg-slate-50 border-0 rounded-2xl text-lg font-bold outline-none" value={formData.buyPrice} onChange={handleInputChange} />
                                    </div>
                                    <div className="col-span-2">
                                        <label className="text-xs font-bold text-slate-400 ml-1">賣出價</label>
                                        <input type="number" step="0.01" name="sellPrice" className="w-full p-4 bg-slate-50 border-0 rounded-2xl text-lg font-bold outline-none" value={formData.sellPrice} onChange={handleInputChange} />
                                    </div>
                                </div>
                                <div className={`p-4 rounded-2xl flex justify-between items-center ${currentPL >= 0 ? 'bg-green-600' : 'bg-red-600'}`}>
                                    <span className="text-white/80 text-sm font-bold">預估損益</span>
                                    <span className="text-white text-xl font-black">{formatCurrency(currentPL)}</span>
                                </div>
                                <button type="submit" disabled={isSyncing} className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-lg active:scale-95 transition-transform">
                                    {isSyncing ? '同步中...' : '儲存紀錄'}
                                </button>
                            </form>
                        </div>

                        <div className="space-y-3">
                            <h3 className="text-sm font-bold text-slate-400 px-1 uppercase tracking-widest">最近紀錄</h3>
                            {records.map((record) => (
                                <div key={record.id} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center">
                                    <div className="flex items-center gap-3">
                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold ${record.pl >= 0 ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-700'}`}>
                                            {record.symbol.substring(0, 1)}
                                        </div>
                                        <div>
                                            <p className="font-bold text-slate-800">{record.symbol}</p>
                                            <p className="text-[10px] text-slate-400">{record.date}</p>
                                        </div>
                                    </div>
                                    <div className="text-right flex items-center gap-4">
                                        <div>
                                            <p className={`font-black ${record.pl >= 0 ? 'text-green-600' : 'text-red-600'}`}>
                                                {record.pl >= 0 ? '+' : ''}{formatCurrency(record.pl)}
                                            </p>
                                            <p className="text-[10px] text-slate-400">{formatQuantity(record.quantity)} 股 @ {record.buyPrice}</p>
                                        </div>
                                        <button onClick={() => deleteRecord(record.id)} className="text-slate-300 hover:text-red-500">刪除</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
